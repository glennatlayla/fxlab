# docker-compose.load.yml — Load test infrastructure for FXLab.
#
# Purpose:
#   Run distributed load tests against the FXLab API using Locust.
#   Includes a full API stack (API + PostgreSQL + Redis) with 4 workers
#   and Locust master + worker nodes for distributed load generation.
#
# Usage:
#   docker compose -f tests/load/docker-compose.load.yml up -d
#   # Open Locust UI at http://localhost:8089
#   # Configure: 50 users, 10 users/sec ramp-up
#
#   # Headless mode:
#   docker compose -f tests/load/docker-compose.load.yml run \
#     --rm locust-master -f /tests/load/locustfile.py \
#     --headless -u 100 -r 20 -t 120s --csv /results/load_test
#
#   # Tear down:
#   docker compose -f tests/load/docker-compose.load.yml down -v

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # API service — 4 workers for realistic production-like load handling
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    environment:
      - DATABASE_URL=postgresql://fxlab:fxlab@postgres:5432/fxlab
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=load-test-secret-key-do-not-use-in-production
      - ENVIRONMENT=test
      - LOG_LEVEL=WARNING
      - PYTHONUNBUFFERED=1
      - WEB_CONCURRENCY=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - load-net

  # ---------------------------------------------------------------------------
  # PostgreSQL — realistic configuration for load testing
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fxlab
      POSTGRES_USER: fxlab
      POSTGRES_PASSWORD: fxlab
    command:
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=4MB
      - -c
      - statement_timeout=30000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fxlab -d fxlab"]
      interval: 2s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - load-net

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
    networks:
      - load-net

  # ---------------------------------------------------------------------------
  # Locust master — Web UI on port 8089
  # ---------------------------------------------------------------------------
  locust-master:
    image: locustio/locust:2.24.1
    ports:
      - "8089:8089"
    volumes:
      - ../../tests/load:/tests/load:ro
      - ./results:/results
    command:
      - --master
      - -f
      - /tests/load/locustfile.py
      - --host
      - http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - load-net

  # ---------------------------------------------------------------------------
  # Locust workers — scale with --scale worker=N
  # ---------------------------------------------------------------------------
  locust-worker:
    image: locustio/locust:2.24.1
    volumes:
      - ../../tests/load:/tests/load:ro
    command:
      - --worker
      - --master-host
      - locust-master
      - -f
      - /tests/load/locustfile.py
    depends_on:
      - locust-master
    networks:
      - load-net

networks:
  load-net:
    driver: bridge
