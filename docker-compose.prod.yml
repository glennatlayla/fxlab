# FXLab Platform — Production Docker Compose
#
# This file defines the full production stack for FXLab. It is designed to
# run on a single Linux host behind an Nginx reverse proxy.
#
# Services:
#   api       — FastAPI backend (Gunicorn + Uvicorn workers)
#   web       — React frontend (Nginx, static assets)
#   postgres  — PostgreSQL 15 database
#   redis     — Redis 7 (rate limiting, job queue, cache)
#   nginx     — Edge reverse proxy (TLS termination, routing)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   - Docker Engine 24+ and Docker Compose v2
#   - .env file with all required secrets (see .env.production.template)
#   - Ports 80 and 443 available on the host
#
# Volumes:
#   postgres-data  — Persistent PostgreSQL storage
#   redis-data     — Persistent Redis AOF
#   nginx-certs    — TLS certificates (optional, for HTTPS)

# ---------------------------------------------------------------------------
# YAML anchors — cross-service defaults (2026-04-20 Tranche A hardening)
# ---------------------------------------------------------------------------
#
# docker does NOT cap json-file log size by default; a chatty service
# can fill /var/lib/docker within hours and take postgres writes
# offline. Every service declares ``logging: *default-logging`` so
# container logs rotate at 10m x 3 files = 30m ceiling per container.
# Aggregate across 9 services: 270m max under `/var/lib/docker/containers`.
# See tests/unit/test_compose_robustness_hygiene.py for the contract.
x-default-logging: &default-logging
  driver: json-file
  options:
    # Quoted so YAML 1.1 does not coerce '10m' to a number / duration.
    max-size: "10m"
    max-file: "3"
    # Best-effort — prevents a slow consumer from blocking the service
    # writer when the host disk is under pressure. Acceptable loss:
    # the newest lines if the daemon is wedged. Without this, a stuck
    # journald/fluent-bit consumer can stall the service's stdout.
    mode: "non-blocking"
    max-buffer-size: "4m"

services:

  # ---------------------------------------------------------------------------
  # Nginx — Edge reverse proxy
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
    container_name: fxlab-nginx
    ports:
      - "${FXLAB_HTTP_PORT:-80}:80"
      - "${FXLAB_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/fxlab.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-certs:/etc/nginx/certs:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # restart: on-failure:3 — bounded retry per 2026-04-20 hardening.
    # A broken nginx after 3 attempts is visible to operators (exited
    # with non-zero) rather than looping silently. Combined with the
    # smoke_health_eval State=restarting detection, this is the shape
    # the install-smoke path exercises end-to-end.
    restart: "on-failure:3"
    logging: *default-logging
    networks:
      - fxlab-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          # nginx is the public ingress — OOM kill means 5xx from
          # /health until docker restarts it. 64M guaranteed is
          # enough for ~10 concurrent connections + worker pool
          # idle state on this compose's nginx:alpine base.
          memory: 64M
          cpus: '0.1'

  # ---------------------------------------------------------------------------
  # API — FastAPI backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      args:
        # Build-arg value comes from the top-level .env via ${ENVIRONMENT}
        # substitution. Default is 'production' — the fail-safe posture
        # if .env is missing (the Dockerfile's own ARG default is also
        # 'production', so this is doubly safe). See 2026-04-16 remediation
        # in docs/remediation/ — a prior literal `ENVIRONMENT: production`
        # defeated install.sh's LAN-detection by forcing the image to
        # always build in production mode regardless of .env.
        ENVIRONMENT: ${ENVIRONMENT:-production}
    container_name: fxlab-api
    expose:
      - "8000"
    environment:
      # DATABASE_URL sslmode is substituted from ${POSTGRES_SSLMODE:-require}.
      # - 'require' (default) is the strict posture: if .env is missing the
      #   variable the api container refuses to connect without SSL.
      # - install.sh writes POSTGRES_SSLMODE=disable for LAN / dev installs
      #   (postgres:15-alpine has no SSL certs) and =require for public /
      #   production installs. See tests/shell/test_install_env_detection.sh
      #   for the ENVIRONMENT↔sslmode pairing invariant.
      - DATABASE_URL=postgresql://${POSTGRES_USER:-fxlab}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fxlab}?sslmode=${POSTGRES_SSLMODE:-require}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - RATE_LIMIT_BACKEND=${RATE_LIMIT_BACKEND:-redis}
      - LOGIN_TRACKER_BACKEND=${LOGIN_TRACKER_BACKEND:-redis}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - PYTHONUNBUFFERED=1
      # Runtime ENVIRONMENT is substituted from .env. Default 'production'
      # is fail-safe. install.sh auto-detects LAN IPs and writes
      # ENVIRONMENT=development; public IPs get ENVIRONMENT=production.
      # FXLAB_ENVIRONMENT_OVERRIDE lets the operator force a value.
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: "on-failure:3"
    logging: *default-logging
    networks:
      - fxlab-net
    # Resource limits + reservations (2026-04-20). Reservations guarantee
    # api has its floor of memory/CPU so a Prometheus query burst or
    # cadvisor spike cannot OOM-kill it. limits cap the worst case.
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # ---------------------------------------------------------------------------
  # Web — React frontend (served via nginx)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle by Vite at build time. Default /api
        # works behind the nginx edge proxy on any host. Override via
        # VITE_API_BASE_URL in .env for custom deployments.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: fxlab-web
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: "on-failure:3"
    logging: *default-logging
    networks:
      - fxlab-net
    # web is stateless SPA assets behind nginx; no reservation — it
    # can tolerate being squeezed under pressure and nginx serves a
    # cached error page in the worst case.
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ---------------------------------------------------------------------------
  # PostgreSQL — Relational database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: fxlab-postgres
    expose:
      - "5432"
    # N3 remediation (2026-04-15): the 2026-04-15 minitux install log
    # contained the line::
    #
    #     WARNING: the locale "en_US.UTF-8" is not installed
    #
    # on every postgres boot. postgres:15-alpine ships with musl libc,
    # which does not bundle the en_US.UTF-8 locale. initdb inherits
    # LANG from the container; unset LANG falls back to a locale that
    # is not installed, producing the warning on every boot.
    #
    # Fix:
    #   LANG=C.UTF-8            — Alpine-available UTF-8 locale;
    #                             initdb uses it by default.
    #   --locale=C.UTF-8 in     — pins the locale in pg_database
    #   POSTGRES_INITDB_ARGS      rather than relying on the process
    #                             environment. Only read on first-run
    #                             initdb; no-op on subsequent boots.
    #
    # C.UTF-8 provides byte-ordered collation and UTF-8 encoding.
    # FXLab uses byte-ordered comparisons everywhere; locale-aware
    # case-insensitive comparisons are NOT used, so C.UTF-8 has no
    # behavioural cost. See
    # tests/unit/test_postgres_locale_hygiene.py for the contract.
    #
    # KNOWN RESIDUAL (v2 remediation, cosmetic):
    # The postgres:15-alpine entrypoint probes the `locale` binary to
    # discover system locale settings. Alpine musl does NOT ship the
    # `locale` binary, so the entrypoint emits:
    #
    #     sh: locale: not found
    #     warning: no usable system locales were found
    #
    # This is DIFFERENT from the N3 warning ("en_US.UTF-8 is not
    # installed") and is NOT a functional issue — initdb correctly uses
    # LANG=C.UTF-8 from the environment regardless of the locale probe.
    # The warning is cosmetic noise from the entrypoint script itself.
    #
    # We accept this noise rather than adding a custom Dockerfile or
    # installing musl-locales, because:
    #   1. The locale is correctly pinned via LANG and --locale=C.UTF-8.
    #   2. A custom postgres Dockerfile adds build-time complexity for
    #      zero functional gain.
    #   3. The noise is stable (always the same two lines) and operators
    #      can be trained to ignore it.
    #
    # If you want to silence it: `RUN apk add --no-cache musl-locales`
    # in a custom postgres Dockerfile. See Phase 6 of
    # docs/remediation/2026-04-15-remediation-plan-v2.md.
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-fxlab}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-fxlab}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --locale=C.UTF-8
      - LANG=C.UTF-8
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fxlab} -d ${POSTGRES_DB:-fxlab}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: "on-failure:3"
    logging: *default-logging
    networks:
      - fxlab-net
    # postgres is the system of record. Reservations (2026-04-20)
    # guarantee shared_buffers + work_mem cannot be starved by a
    # noisy neighbour. 384M reservation = 75% of limit; the 25%
    # headroom absorbs query bursts without pushing into OOM risk.
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 384M
          cpus: '0.25'

  # ---------------------------------------------------------------------------
  # Redis — Cache, rate limiting, job queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: fxlab-redis
    expose:
      - "6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 128
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: "on-failure:3"
    logging: *default-logging
    networks:
      - fxlab-net
    # redis holds rate-limit counters, login tracker state, and job
    # queue. Reservations (2026-04-20) guarantee it cannot be squeezed
    # below its configured maxmemory (256M). 256M reservation ==
    # maxmemory so redis never has to evict under host memory
    # pressure; the 128M limit headroom covers command buffers.
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.15'

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics collection & alerting
  # ---------------------------------------------------------------------------
  # Collects application metrics (API, order latency, broker health) and
  # infrastructure metrics (CPU, memory, disk) from all exporters.
  # Evaluates alert rules every 15s and routes to Alertmanager.
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: fxlab-prometheus
    expose:
      - "9090"
    # 127.0.0.1:9090:9090 (2026-04-20): loopback-only host binding so
    # operators SSH'd into the host can reach the Prometheus UI for
    # diagnostics (e.g. query cost, TSDB cardinality) without
    # publishing the UI to the network. Public operator access should
    # still go through an authenticated reverse proxy if needed.
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: "on-failure:3"
    logging: *default-logging
    networks:
      - fxlab-net
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ---------------------------------------------------------------------------
  # Alertmanager — Alert routing & notification
  # ---------------------------------------------------------------------------
  # Routes Prometheus alerts to notification channels (webhook, email, Slack,
  # PagerDuty) based on severity and grouping rules. Deduplicates and
  # throttles alert notifications to avoid fatigue.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: fxlab-alertmanager
    expose:
      - "9093"
    # Alertmanager does NOT interpolate env vars in its config file.
    # The config uses __PLACEHOLDER__ markers; this entrypoint runs sed
    # to replace them with actual env-var values before starting.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed \
          -e "s|__ALERTMANAGER_WEBHOOK_URL__|$$ALERTMANAGER_WEBHOOK_URL|g" \
          -e "s|__ALERTMANAGER_CRITICAL_WEBHOOK_URL__|$$ALERTMANAGER_CRITICAL_WEBHOOK_URL|g" \
          /etc/alertmanager/alertmanager.yml.tmpl > /tmp/alertmanager.yml
        exec /bin/alertmanager \
          --config.file=/tmp/alertmanager.yml \
          --storage.path=/alertmanager \
          --log.level=info
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml.tmpl:ro
      - alertmanager-data:/alertmanager
    environment:
      - TZ=UTC
      - ALERTMANAGER_WEBHOOK_URL=${ALERTMANAGER_WEBHOOK_URL:-http://fxlab-api:8000/observability/alert-webhook}
      - ALERTMANAGER_CRITICAL_WEBHOOK_URL=${ALERTMANAGER_CRITICAL_WEBHOOK_URL:-http://fxlab-api:8000/observability/alert-webhook}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: "on-failure:3"
    logging: *default-logging
    networks:
      - fxlab-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # ---------------------------------------------------------------------------
  # Node Exporter — Host metrics (CPU, memory, disk, network)
  # ---------------------------------------------------------------------------
  # Exposes host-level metrics required for infrastructure alerting:
  # high CPU, memory pressure, disk usage, etc.
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: fxlab-node-exporter
    expose:
      - "9100"
    # N2 remediation (2026-04-15): node-exporter v1.7.0 enables ~44
    # default collectors. Several probe /sys paths that do not exist
    # in the containerised kernel view on minitux / Azure VMs;
    # each failing collector closes its connection early, which
    # Prometheus sees as "connection reset by peer". To eliminate
    # that flood:
    #
    #   --collector.disable-defaults turns the collector list into
    #   an explicit allowlist; only the collectors named below run.
    #   --web.max-requests raises the concurrent-request cap above
    #   the default 40, removing the race window where Prometheus's
    #   first scrape burst could be RST'd.
    #
    # The allowlist is the minimum set required by the existing
    # alert rules and Grafana dashboards. Adding a collector here is
    # a deliberate review decision; see
    # tests/unit/test_node_exporter_scrape_hygiene.py for the contract.
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.disable-defaults'
      - '--collector.cpu'
      - '--collector.meminfo'
      - '--collector.loadavg'
      - '--collector.filesystem'
      - '--collector.diskstats'
      - '--collector.netdev'
      - '--collector.netstat'
      - '--collector.uname'
      - '--collector.time'
      - '--collector.stat'
      - '--collector.vmstat'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.netdev.device-exclude=^(veth.*|br.*|docker.*|virbr.*|lo)$$'
      - '--web.max-requests=100'
      - '--web.listen-address=:9100'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    environment:
      - NODE_ID=fxlab-prod-host
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9100/metrics"]
      interval: 15s
      timeout: 10s
      retries: 3
      # start_period=30s: allows /proc and /sys collectors to stabilise
      # on a cold boot before the first healthcheck probes the listener.
      # Anything shorter produces 'starting' → 'unhealthy' flapping
      # that compounds with scrape-side RSTs.
      start_period: 30s
    restart: "on-failure:3"
    logging: *default-logging
    networks:
      - fxlab-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # ---------------------------------------------------------------------------
  # cAdvisor — Container metrics (CPU, memory, network per container)
  # ---------------------------------------------------------------------------
  # Exposes Docker container resource metrics for per-container alerting:
  # memory limits, CPU usage, network I/O, etc.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: fxlab-cadvisor
    # Privileged mode required for cAdvisor to access cgroup filesystem
    # and /dev/kmsg on cgroupsv2 hosts (Ubuntu 22.04+, RHEL 9+).
    # Without this, cAdvisor fails to initialise and dumps help text.
    privileged: true
    expose:
      - "8080"
    # N1 remediation (2026-04-15) + 2026-04-20 accelerator fix:
    #
    # The original flag set produced usage-like output and
    # restart-looping on minitux (kernel 6.x, cgroupsv2). Two edits
    # reached this shape:
    #
    #   2026-04-15 — pinned --docker_only, --store_container_labels,
    #                --disable_metrics, and a fixed 30 s
    #                --housekeeping_interval.
    #   2026-04-20 — removed `accelerator` from --disable_metrics.
    #                `accelerator` is NOT a valid metric name in
    #                cAdvisor v0.49.1 (Nvidia GPU support was reworked
    #                in v0.47). Passing it caused cAdvisor's Go flag
    #                parser to reject the entire flag set, dump usage
    #                to stderr, and exit with code 2 — which the
    #                unless-stopped restart policy then looped
    #                forever.
    #
    # Flag-by-flag justification:
    #   --docker_only=true           — skip LXC / systemd-nspawn /
    #                                  raw-cgroup discovery so cadvisor
    #                                  does not log warnings every
    #                                  housekeeping tick about missing
    #                                  cgroup hierarchies that minitux
    #                                  and the Azure VM target do not
    #                                  have.
    #   --store_container_labels=... — false prevents Prometheus time
    #                                  series cardinality explosion
    #                                  (labels × containers), saving
    #                                  both cadvisor memory and
    #                                  Prometheus storage.
    #   --disable_metrics=...        — silences cpu_topology and
    #                                  resctrl collectors that probe
    #                                  /sys paths not present on these
    #                                  kernels. Every token here MUST
    #                                  be in cAdvisor v0.49.1's valid-
    #                                  metrics set (see the enum in
    #                                  tests/unit/test_cadvisor_command_hygiene.py).
    # --max_housekeeping_interval removed: we pin a fixed 30 s cadence
    # via --housekeeping_interval and do not need dynamic housekeeping.
    # See tests/unit/test_cadvisor_command_hygiene.py for the contract
    # and the defensive validator that prevents reintroducing an
    # unknown metric name.
    command:
      - '--port=8080'
      - '--housekeeping_interval=30s'
      - '--docker_only=true'
      - '--store_container_labels=false'
      - '--disable_metrics=cpu_topology,resctrl'
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: "on-failure:3"
    logging: *default-logging
    networks:
      - fxlab-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

networks:
  fxlab-net:
    driver: bridge
    name: fxlab-network

volumes:
  postgres-data:
    name: fxlab-postgres-data
  redis-data:
    name: fxlab-redis-data
  nginx-certs:
    name: fxlab-nginx-certs
  prometheus-data:
    name: fxlab-prometheus-data
  alertmanager-data:
    name: fxlab-alertmanager-data
