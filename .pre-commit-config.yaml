# FXLab pre-commit hooks
# Install: make hooks
# Run manually: pre-commit run --all-files
#
# Global exclude patterns (applied to every hook):
#   - .archive/         CLAUDE.md §1.6 backups; never auto-modify.
#   - _archived/        Same.
#   - User Spec/        Source-of-truth specs; never auto-modify.
#                       (Only the Algo Specfication and Examples/
#                       subdirectory is committed; the rest is the
#                       operator's private working notes.)
#   - Strategy Repo/    Production IR / experiment_plan / search_space
#                       fixtures consumed by M1+M2 unit tests as
#                       canonical valid shapes; auto-modifying them
#                       (e.g., adding a trailing newline) silently
#                       rewrites the spec the parser was validated
#                       against.
#   - tests/fixtures/   Fixtures may be intentionally malformed
#                       (e.g. malformed_ohlcv.csv); auto-fixing
#                       trailing whitespace or line endings would
#                       silently change what "malformed" means.
#   - *.golden.*        Golden snapshots are byte-exact; auto-fixing
#                       breaks the snapshot semantics.
#   - **/__snapshots__/  Vitest snapshot files (*.snap) are also
#                       byte-exact auto-generated artefacts; trailing
#                       whitespace inside React-rendered HTML is
#                       semantically meaningful and stripping it
#                       breaks the snapshot match the next time the
#                       test runs.
#   - .venv/, node_modules/   Vendored deps.

exclude: |
  (?x)^(
    \.archive/.*|
    _archived/.*|
    User\ Spec/.*|
    Strategy\ Repo/.*|
    tests/fixtures/.*|
    .*\.golden\..*|
    .*/__snapshots__/.*|
    \.venv/.*|
    .*/node_modules/.*|
    fxlab_test\.db.*
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep this rev in lock-step with requirements.txt's ruff pin so the
    # pre-commit-driven formatter is byte-identical to the formatter run
    # by `make format-check` and the CI verify gate. Drift between them
    # is what allowed Tranche L slips to land on main on 2026-04-16.
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # NOTE: mypy is intentionally NOT run in pre-commit.
  #
  # The local `make verify` gate runs format-check, lint, test-unit, and
  # compose-check — it does NOT run mypy. Adding mypy to pre-commit would
  # block every commit on 39 pre-existing type-check errors across
  # services/ and libs/ (catalogued in deferred-issues — Tranche-N
  # mypy debt remediation), missing type stubs (types-redis,
  # types-PyYAML, types-requests), and a scripts/validate_migrations
  # duplicate-module conflict.
  #
  # Mypy continues to run in CI's `quality` job (.github/workflows/ci.yml),
  # where the operator can review it as aspirational tech debt without
  # it gating individual commits on unrelated work. Restore the mypy
  # hook here once Tranche-N is closed.
