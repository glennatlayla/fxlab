# FXLab pre-commit hooks
# Install: make hooks
# Run manually: pre-commit run --all-files
#
# Global exclude patterns (applied to every hook):
#   - .archive/         CLAUDE.md §1.6 backups; never auto-modify.
#   - _archived/        Same.
#   - User Spec/        Source-of-truth specs; never auto-modify.
#                       (Only the Algo Specfication and Examples/
#                       subdirectory is committed; the rest is the
#                       operator's private working notes.)
#   - Strategy Repo/    Production IR / experiment_plan / search_space
#                       fixtures consumed by M1+M2 unit tests as
#                       canonical valid shapes; auto-modifying them
#                       (e.g., adding a trailing newline) silently
#                       rewrites the spec the parser was validated
#                       against.
#   - tests/fixtures/   Fixtures may be intentionally malformed
#                       (e.g. malformed_ohlcv.csv); auto-fixing
#                       trailing whitespace or line endings would
#                       silently change what "malformed" means.
#   - *.golden.*        Golden snapshots are byte-exact; auto-fixing
#                       breaks the snapshot semantics.
#   - **/__snapshots__/  Vitest snapshot files (*.snap) are also
#                       byte-exact auto-generated artefacts; trailing
#                       whitespace inside React-rendered HTML is
#                       semantically meaningful and stripping it
#                       breaks the snapshot match the next time the
#                       test runs.
#   - .venv/, node_modules/   Vendored deps.

exclude: |
  (?x)^(
    \.archive/.*|
    _archived/.*|
    User\ Spec/.*|
    Strategy\ Repo/.*|
    tests/fixtures/.*|
    .*\.golden\..*|
    .*/__snapshots__/.*|
    \.venv/.*|
    .*/node_modules/.*|
    fxlab_test\.db.*
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep this rev in lock-step with requirements.txt's ruff pin so the
    # pre-commit-driven formatter is byte-identical to the formatter run
    # by `make format-check` and the CI verify gate. Drift between them
    # is what allowed Tranche L slips to land on main on 2026-04-16.
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    # mypy was disabled here in M-prep #2 because services/+libs/ had
    # 39 pre-existing type errors. M-prep #7 (sha 5dcb9a9) cleared
    # those, today's buildout introduced 19 more, CI green-fix #3
    # (a3accd9) cleared those too. Re-enabled in tech-debt #10.
    hooks:
      - id: mypy
        args:
          - --warn-unused-ignores
          - --ignore-missing-imports
          - --no-strict-optional
        # Match CI's quality-job mypy invocation byte-for-byte so
        # local pre-commit and the cloud gate stay in sync.
        files: ^(services|libs)/.*\.py$
        additional_dependencies:
          - pydantic>=2.10
          - sqlalchemy>=2.0
          - types-PyYAML
          - types-requests
          # Runtime packages whose real type stubs are needed for the hook
          # to see the same Result/attr types as CI's `make verify` mypy run.
          # Without these, the hook would falsely flag `# type: ignore`
          # comments as unused (because the imported modules become Any
          # under --ignore-missing-imports), and removing those ignores
          # would then break CI where the packages ARE installed.
          - redis==5.0.1
          - minio==7.2.20
          - PyJWT[crypto]==2.12.1
          - starlette==0.49.3
