[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Prevent pytest from wandering into the venv, archives, or generated
# directories and collecting third-party library tests.  Without this,
# pytest will recurse into .venv and discover thousands of test files
# from passlib, pyarrow, and other installed packages.
norecursedirs = .venv .archive .claude __pycache__ *.egg-info .git .mypy_cache
addopts =
    --strict-markers
    --cov=libs
    --cov=services
    --cov-report=term-missing
    --cov-config=.coveragerc
    -v
markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (require external services)
    acceptance: Acceptance tests (end-to-end scenarios)

# Targeted warning suppression. Each entry must include the source module
# (the last colon-segment) so this never accidentally hides warnings from
# our own code or another library.  Tracked as Tranche-N tech debt to fix
# at source via dependency upgrade rather than suppression.
filterwarnings =
    # starlette imports the deprecated `multipart` package name, but the
    # canonical PyPI distribution renamed itself to `python_multipart`.
    # The starlette maintainers will switch to the new import in a future
    # release; until then this PendingDeprecationWarning fires once per
    # test process and inflates the warning total by ~2000 across the
    # suite.  Anchored to starlette.formparsers so a future regression in
    # our own code that uses the deprecated import would still surface.
    ignore:Please use `import python_multipart` instead.:PendingDeprecationWarning:starlette.formparsers
