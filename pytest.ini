[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Prevent pytest from wandering into the venv, archives, or generated
# directories and collecting third-party library tests.  Without this,
# pytest will recurse into .venv and discover thousands of test files
# from passlib, pyarrow, and other installed packages.
norecursedirs = .venv .archive .claude __pycache__ *.egg-info .git .mypy_cache
addopts =
    --strict-markers
    --cov=libs
    --cov=services
    --cov-report=term-missing
    --cov-config=.coveragerc
    -v
markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (require external services)
    acceptance: Acceptance tests (end-to-end scenarios)
