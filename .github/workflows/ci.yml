# FXLab CI Pipeline
# Triggers on push to any branch and PRs targeting main or develop.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  ENVIRONMENT: test

jobs:
  # ---------------------------------------------------------------------------
  # `verify` mirrors what every dev runs locally via `make verify`:
  # format-check -> lint -> test-unit (with 80% coverage gate) -> compose-check.
  #
  # The point is parity: if a dev's local `make verify` passes, this job
  # passes too. Drift between local and CI gates is what allowed Tranche L
  # to slip past format/lint on 2026-04-16. By wrapping the same Makefile
  # target instead of duplicating individual steps, the two stay aligned
  # automatically as `make verify` evolves.
  #
  # The downstream jobs (quality / security / test / migrations-postgres /
  # build) remain in place because they emit specific artifacts (coverage,
  # bandit, mypy) that the operator reviews independently. `verify` is the
  # belt; the others are the suspenders.
  # ---------------------------------------------------------------------------
  verify:
    name: Local verify-gate parity (make verify)
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      DATABASE_URL: sqlite:///./test.db
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (dev set, mirrors local bootstrap)
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements-dev.txt

      - name: Bootstrap node + frontend deps (mirrors `make bootstrap`)
        # `make verify` -> `make test-unit` includes
        # tests/unit/test_m0_frontend_structure.py::test_ac8_npm_build_succeeds
        # which by design FAILS HARD (does not skip) when
        # frontend/node_modules is missing. The local `make bootstrap`
        # target provisions both node-via-nodeenv and the npm deps;
        # this CI step does the same so CI stays in parity with what
        # a dev sees locally.
        run: |
          .venv/bin/python -m nodeenv --python-virtualenv --node=lts --prebuilt
          cd frontend && PATH="${GITHUB_WORKSPACE}/.venv/bin:$PATH" npm install --silent

      - name: make verify
        run: make verify

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Format check
        run: .venv/bin/ruff format --check .

      - name: Lint
        run: .venv/bin/ruff check .

      - name: Type check with mypy
        run: |
          .venv/bin/mypy \
            --warn-unused-ignores \
            --cache-dir=/tmp/mypy-cache \
            services/ \
            libs/

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Dependency audit (pip-audit)
        # CVE-2026-3219 is a vulnerability in pip itself (the package
        # installer). pip-audit, run inside a venv, audits its own
        # installed packages including pip. There is no upstream fix
        # available as of 2026-04-25 — pip's maintainers have not
        # released a patched version. Ignoring this single advisory
        # lets the gate enforce all OTHER package CVEs strictly.
        # Re-evaluate when a patched pip ships; remove this flag and
        # bump pip in requirements.txt at the same time.
        run: .venv/bin/pip-audit --strict --ignore-vuln CVE-2026-3219

      - name: Static security analysis (bandit)
        run: |
          .venv/bin/bandit -r services/ libs/ \
            -ll \
            --skip B101 \
            -f json -o bandit-report.json || true
          .venv/bin/bandit -r services/ libs/ \
            -ll \
            --skip B101

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    env:
      ENVIRONMENT: test
      DATABASE_URL: sqlite:///./test.db
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Bootstrap node + frontend deps (mirrors `make bootstrap`)
        # tests/unit/test_m0_frontend_structure.py::test_ac8_npm_build_succeeds
        # is a unit test that requires frontend/node_modules to exist (it
        # hard-fails, does not skip, when missing). The verify job has the
        # same step; this brings the Tests job into parity. Without this,
        # the Tests job runs all 4742 unit tests but fails on this single
        # frontend-build-validation test even though everything else passes.
        run: |
          .venv/bin/python -m nodeenv --python-virtualenv --node=lts --prebuilt
          cd frontend && PATH="${GITHUB_WORKSPACE}/.venv/bin:$PATH" npm install --silent

      - name: Run tests
        # Scope explicitly to tests/unit/. Without this, pytest's default
        # collection sweeps in tests/integration/ which includes
        # test_docker_compose_startup.py and test_docker_compose_services.py
        # — both require a live docker daemon and the full compose stack
        # to be running, which this CI worker does not provide. Those
        # belong in a separate integration job (or `make install-smoke`).
        # The local `make test-unit` and `make verify` already use this
        # same scope; this brings CI into parity.
        run: |
          .venv/bin/python -m pytest tests/unit/ \
            --tb=short -q \
            --cov=services --cov=libs \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Coverage gate (≥80%)
        run: .venv/bin/python -m pytest tests/unit/ --cov=services --cov=libs --cov-fail-under=80 --tb=no -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  migrations-postgres:
    # -------------------------------------------------------------------------
    # Runs the full Alembic migration chain (upgrade → downgrade → upgrade)
    # against a real PostgreSQL 15 instance. This is the authoritative gate
    # that catches dialect-specific DDL errors such as BOOLEAN DEFAULT 0,
    # which offline SQL generation and SQLite-backed unit tests silently
    # accept. See libs/dev/migration_integrity_validator.py for the service
    # layer and scripts/validate_migrations.py for the CLI entry point.
    # -------------------------------------------------------------------------
    name: Migrations (real PostgreSQL)
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: fxlab_test
          POSTGRES_PASSWORD: fxlab_test
          POSTGRES_DB: fxlab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fxlab_test -d fxlab_test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://fxlab_test:fxlab_test@localhost:5432/fxlab_test
      CORRELATION_ID: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Round-trip migration validation (upgrade → downgrade → upgrade)
        run: .venv/bin/python scripts/validate_migrations.py --log-level INFO

      - name: Run PostgreSQL-specific integration test
        run: |
          .venv/bin/python -m pytest \
            tests/integration/dev/test_alembic_migration_runner_integration.py \
            -m integration \
            --no-cov \
            -q --tb=short
        env:
          TEST_DATABASE_URL: postgresql://fxlab_test:fxlab_test@localhost:5432/fxlab_test

  integration:
    # -------------------------------------------------------------------------
    # Runs the integration test suite (tests/integration/) against a real
    # Postgres + Redis stack brought up via docker-compose.test.yml.
    #
    # Why docker-compose.test.yml (not docker-compose.prod.yml):
    #   docker-compose.test.yml is the CI-purpose file: Postgres 15 + Redis 7
    #   on offset ports (5433/6380) with ephemeral tmpfs storage. It exists
    #   precisely for this scenario — see its header comment. Bringing up
    #   docker-compose.prod.yml here would require generating a real .env,
    #   building the API/web/nginx images, binding host ports 80/443, and
    #   spinning up the full Prometheus/Alertmanager/exporter stack. That
    #   is what `make install-smoke` already does locally and what a future
    #   smoke job could add. For exercising tests/integration/ on every PR
    #   we want only the data-tier dependencies that the tests' conftest.py
    #   reaches for via TEST_DATABASE_URL.
    #
    # Why this is needed:
    #   The Tests job is scoped to tests/unit/ (M-prep #9 sha 000e4c7) so
    #   that integration tests requiring real services never accidentally
    #   tank the unit suite. Before this job, integration tests were only
    #   exercised via `make install-smoke` on an operator's machine — never
    #   on PRs. This job closes that gap.
    # -------------------------------------------------------------------------
    name: Integration tests (docker compose)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30
    env:
      ENVIRONMENT: test
      # tests/integration/conftest.py reads TEST_DATABASE_URL and falls back
      # to in-memory SQLite when unset. Setting it points the suite at the
      # postgres-test container brought up by docker-compose.test.yml below.
      TEST_DATABASE_URL: postgresql://fxlab_test:fxlab_test@localhost:5433/fxlab_test
      REDIS_URL: redis://localhost:6380/0
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python deps for the integration test runner
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Bring up the test compose stack (postgres + redis)
        # --wait blocks until every service either passes its healthcheck
        # or fails them all (job exits non-zero with a clear error).
        # docker-compose.test.yml uses tmpfs for postgres data so the
        # stack is fully ephemeral; teardown -v removes everything.
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Run integration tests
        # Run EVERY test under tests/integration/, not just those carrying
        # the @pytest.mark.integration marker. The marker is registered
        # but only applied to one file today (test_alembic_migration_runner_integration.py)
        # — using -m integration would silently skip the docker-compose-
        # dependent tests this job exists to exercise. The directory
        # scope is the contract: anything under tests/integration/ runs
        # in this job, full stop.
        # --no-cov disables coverage collection for this job — the Tests
        # job already enforces the 80% gate against tests/unit/, and
        # mixing the two coverage runs would dilute the gate.
        run: |
          .venv/bin/python -m pytest tests/integration/ \
            --tb=short -q \
            --no-cov

      - name: Capture compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs > compose-logs.txt

      - name: Upload compose logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: compose-logs
          path: compose-logs.txt

      - name: Tear down compose stack
        # Always run, even on failure — the GitHub Actions runner is
        # ephemeral but leaving containers + volumes around can cause
        # port-binding failures if a job is retried in the same runner
        # context. -v removes the named volumes for a clean slate.
        if: always()
        run: docker compose -f docker-compose.test.yml down --volumes

  build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: [test, security, migrations-postgres]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build \
            -f services/api/Dockerfile \
            -t fxlab-api:ci-test \
            .
