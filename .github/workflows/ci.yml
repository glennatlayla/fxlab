# FXLab CI Pipeline
# Triggers on push to any branch and PRs targeting main or develop.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  ENVIRONMENT: test

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Format check
        run: .venv/bin/ruff format --check .

      - name: Lint
        run: .venv/bin/ruff check .

      - name: Type check with mypy
        run: |
          .venv/bin/mypy \
            --warn-unused-ignores \
            --cache-dir=/tmp/mypy-cache \
            services/ \
            libs/

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Dependency audit (pip-audit)
        run: .venv/bin/pip-audit --strict

      - name: Static security analysis (bandit)
        run: |
          .venv/bin/bandit -r services/ libs/ \
            -ll \
            --skip B101 \
            -f json -o bandit-report.json || true
          .venv/bin/bandit -r services/ libs/ \
            -ll \
            --skip B101

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    env:
      ENVIRONMENT: test
      DATABASE_URL: sqlite:///./test.db
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Run tests
        run: |
          .venv/bin/python -m pytest \
            --tb=short -q \
            --cov=services --cov=libs \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Coverage gate (≥80%)
        run: .venv/bin/python -m pytest --cov=services --cov=libs --cov-fail-under=80 --tb=no -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  migrations-postgres:
    # -------------------------------------------------------------------------
    # Runs the full Alembic migration chain (upgrade → downgrade → upgrade)
    # against a real PostgreSQL 15 instance. This is the authoritative gate
    # that catches dialect-specific DDL errors such as BOOLEAN DEFAULT 0,
    # which offline SQL generation and SQLite-backed unit tests silently
    # accept. See libs/dev/migration_integrity_validator.py for the service
    # layer and scripts/validate_migrations.py for the CLI entry point.
    # -------------------------------------------------------------------------
    name: Migrations (real PostgreSQL)
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: fxlab_test
          POSTGRES_PASSWORD: fxlab_test
          POSTGRES_DB: fxlab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fxlab_test -d fxlab_test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://fxlab_test:fxlab_test@localhost:5432/fxlab_test
      CORRELATION_ID: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Round-trip migration validation (upgrade → downgrade → upgrade)
        run: .venv/bin/python scripts/validate_migrations.py --log-level INFO

      - name: Run PostgreSQL-specific integration test
        run: |
          .venv/bin/python -m pytest \
            tests/integration/dev/test_alembic_migration_runner_integration.py \
            -m integration \
            --no-cov \
            -q --tb=short
        env:
          TEST_DATABASE_URL: postgresql://fxlab_test:fxlab_test@localhost:5432/fxlab_test

  build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: [test, security, migrations-postgres]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build \
            -f services/api/Dockerfile \
            -t fxlab-api:ci-test \
            .
