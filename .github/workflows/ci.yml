# FXLab CI Pipeline
# Triggers on push to any branch and PRs targeting main or develop.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  ENVIRONMENT: test

jobs:
  # ---------------------------------------------------------------------------
  # `verify` mirrors what every dev runs locally via `make verify`:
  # format-check -> lint -> test-unit (with 80% coverage gate) -> compose-check.
  #
  # The point is parity: if a dev's local `make verify` passes, this job
  # passes too. Drift between local and CI gates is what allowed Tranche L
  # to slip past format/lint on 2026-04-16. By wrapping the same Makefile
  # target instead of duplicating individual steps, the two stay aligned
  # automatically as `make verify` evolves.
  #
  # The downstream jobs (quality / security / test / migrations-postgres /
  # build) remain in place because they emit specific artifacts (coverage,
  # bandit, mypy) that the operator reviews independently. `verify` is the
  # belt; the others are the suspenders.
  # ---------------------------------------------------------------------------
  verify:
    name: Local verify-gate parity (make verify)
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      DATABASE_URL: sqlite:///./test.db
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (dev set, mirrors local bootstrap)
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements-dev.txt

      - name: Bootstrap node + frontend deps (mirrors `make bootstrap`)
        # `make verify` -> `make test-unit` includes
        # tests/unit/test_m0_frontend_structure.py::test_ac8_npm_build_succeeds
        # which by design FAILS HARD (does not skip) when
        # frontend/node_modules is missing. The local `make bootstrap`
        # target provisions both node-via-nodeenv and the npm deps;
        # this CI step does the same so CI stays in parity with what
        # a dev sees locally.
        run: |
          .venv/bin/python -m nodeenv --python-virtualenv --node=lts --prebuilt
          cd frontend && PATH="${GITHUB_WORKSPACE}/.venv/bin:$PATH" npm install --silent

      - name: make verify
        run: make verify

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Format check
        run: .venv/bin/ruff format --check .

      - name: Lint
        run: .venv/bin/ruff check .

      - name: Type check with mypy
        run: |
          .venv/bin/mypy \
            --warn-unused-ignores \
            --cache-dir=/tmp/mypy-cache \
            services/ \
            libs/

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Dependency audit (pip-audit)
        # CVE-2026-3219 is a vulnerability in pip itself (the package
        # installer). pip-audit, run inside a venv, audits its own
        # installed packages including pip. There is no upstream fix
        # available as of 2026-04-25 — pip's maintainers have not
        # released a patched version. Ignoring this single advisory
        # lets the gate enforce all OTHER package CVEs strictly.
        # Re-evaluate when a patched pip ships; remove this flag and
        # bump pip in requirements.txt at the same time.
        run: .venv/bin/pip-audit --strict --ignore-vuln CVE-2026-3219

      - name: Static security analysis (bandit)
        run: |
          .venv/bin/bandit -r services/ libs/ \
            -ll \
            --skip B101 \
            -f json -o bandit-report.json || true
          .venv/bin/bandit -r services/ libs/ \
            -ll \
            --skip B101

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    env:
      ENVIRONMENT: test
      DATABASE_URL: sqlite:///./test.db
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Run tests
        # Scope explicitly to tests/unit/. Without this, pytest's default
        # collection sweeps in tests/integration/ which includes
        # test_docker_compose_startup.py and test_docker_compose_services.py
        # — both require a live docker daemon and the full compose stack
        # to be running, which this CI worker does not provide. Those
        # belong in a separate integration job (or `make install-smoke`).
        # The local `make test-unit` and `make verify` already use this
        # same scope; this brings CI into parity.
        run: |
          .venv/bin/python -m pytest tests/unit/ \
            --tb=short -q \
            --cov=services --cov=libs \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Coverage gate (≥80%)
        run: .venv/bin/python -m pytest tests/unit/ --cov=services --cov=libs --cov-fail-under=80 --tb=no -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  migrations-postgres:
    # -------------------------------------------------------------------------
    # Runs the full Alembic migration chain (upgrade → downgrade → upgrade)
    # against a real PostgreSQL 15 instance. This is the authoritative gate
    # that catches dialect-specific DDL errors such as BOOLEAN DEFAULT 0,
    # which offline SQL generation and SQLite-backed unit tests silently
    # accept. See libs/dev/migration_integrity_validator.py for the service
    # layer and scripts/validate_migrations.py for the CLI entry point.
    # -------------------------------------------------------------------------
    name: Migrations (real PostgreSQL)
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: fxlab_test
          POSTGRES_PASSWORD: fxlab_test
          POSTGRES_DB: fxlab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fxlab_test -d fxlab_test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://fxlab_test:fxlab_test@localhost:5432/fxlab_test
      CORRELATION_ID: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Round-trip migration validation (upgrade → downgrade → upgrade)
        run: .venv/bin/python scripts/validate_migrations.py --log-level INFO

      - name: Run PostgreSQL-specific integration test
        run: |
          .venv/bin/python -m pytest \
            tests/integration/dev/test_alembic_migration_runner_integration.py \
            -m integration \
            --no-cov \
            -q --tb=short
        env:
          TEST_DATABASE_URL: postgresql://fxlab_test:fxlab_test@localhost:5432/fxlab_test

  build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: [test, security, migrations-postgres]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build \
            -f services/api/Dockerfile \
            -t fxlab-api:ci-test \
            .
