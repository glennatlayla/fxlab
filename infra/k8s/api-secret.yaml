# ---------------------------------------------------------------------------
# FXLab API — Secret Template
# ---------------------------------------------------------------------------
# Purpose:
#   Template for Kubernetes Secret containing sensitive configuration.
#   In production, these values should be populated by:
#     1. Sealed Secrets (Bitnami) — encrypted in git, decrypted in-cluster.
#     2. External Secrets Operator — synced from AWS Secrets Manager, Vault, etc.
#     3. Manual creation via kubectl (not recommended for GitOps).
#
# WARNING:
#   This file contains PLACEHOLDER values only. Never commit real secrets.
#   The actual Secret object is created by your secrets management pipeline.
#
# Usage (manual — for development only):
#   kubectl create secret generic api-secrets -n fxlab \
#     --from-literal=DB_URL='postgresql://user:pass@db:5432/fxlab?sslmode=require' \
#     --from-literal=JWT_SECRET_KEY='<32+ byte random key>' \
#     --from-literal=REDIS_URL='redis://:password@redis:6379/0'
#
# Usage (sealed secrets):
#   kubeseal --format=yaml < api-secret.yaml > api-sealed-secret.yaml
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: fxlab
  labels:
    app: fxlab-api
    component: api
    part-of: fxlab
type: Opaque
stringData:
  # -- Database connection URL ----------------------------------------------
  # Must use sslmode=require in production. See DEPLOYMENT.md.
  DB_URL: "postgresql://fxlab:CHANGE_ME@postgres.fxlab.svc.cluster.local:5432/fxlab?sslmode=require"

  # -- JWT signing key ------------------------------------------------------
  # Minimum 32 bytes of cryptographic randomness.
  # Generate with: python -c "import secrets; print(secrets.token_urlsafe(48))"
  JWT_SECRET_KEY: "CHANGE_ME_GENERATE_WITH_secrets_token_urlsafe_48"

  # -- Redis connection URL -------------------------------------------------
  REDIS_URL: "redis://:CHANGE_ME@redis.fxlab.svc.cluster.local:6379/0"

  # -- Keycloak (when OIDC is enabled) --------------------------------------
  # KEYCLOAK_ADMIN_CLIENT_SECRET: "CHANGE_ME"

  # -- Broker API keys (if live trading enabled) ----------------------------
  # ALPACA_API_KEY: "CHANGE_ME"
  # ALPACA_SECRET_KEY: "CHANGE_ME"
