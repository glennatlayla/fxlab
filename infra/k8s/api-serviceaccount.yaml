# ---------------------------------------------------------------------------
# FXLab API — ServiceAccount
# ---------------------------------------------------------------------------
# Purpose:
#   Dedicated ServiceAccount for API pods. Referenced in the Deployment spec.
#   Provides identity for RBAC and can be annotated for IAM role binding
#   (e.g., AWS IRSA, GCP Workload Identity) when accessing cloud services.
#
# Usage:
#   kubectl apply -f infra/k8s/api-serviceaccount.yaml
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fxlab-api
  namespace: fxlab
  labels:
    app: fxlab-api
    component: api
    part-of: fxlab
  # Annotate for cloud IAM binding when needed:
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/fxlab-api
  #   iam.gke.io/gcp-service-account: fxlab-api@project.iam.gserviceaccount.com
