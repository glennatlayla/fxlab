version: '3.8'

# FXLab Platform — Docker Compose runtime configuration
#
# Services:
#   api      — FastAPI backend (Phase 3 governance & results)
#   web      — React/Vite frontend
#   postgres — PostgreSQL metadata database (M2+)
#   redis    — Redis job queue / cache (M4+)
#
# All services use restart policies and health checks so that the
# orchestrator can wait for dependencies to be ready before starting
# dependent containers.

services:

  # ---------------------------------------------------------------------------
  # API service — FastAPI backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: fxlab-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-fxlab}:${POSTGRES_PASSWORD:-fxlab}@postgres:5432/${POSTGRES_DB:-fxlab}
      - REDIS_URL=redis://redis:6379/0
      - LOGIN_TRACKER_BACKEND=redis
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-fxlab-api}
      - OTEL_TRACES_SAMPLER_ARG=${OTEL_TRACES_SAMPLER_ARG:-1.0}
      - KEYCLOAK_URL=${KEYCLOAK_URL:-http://keycloak:8080}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-fxlab}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-fxlab-api}
      - KEYCLOAK_ADMIN_CLIENT_SECRET=${KEYCLOAK_ADMIN_CLIENT_SECRET:-}
    # B3 (2026-04-15 cascade): depends_on edges are deliberately split into
    # "genuine" service_healthy edges (postgres, redis — api's lifespan
    # startup blocks on these) and "cascade-safe" service_started edges
    # (keycloak — api fetches JWKS lazily on first authenticated request,
    # so keycloak being temporarily unhealthy must not prevent api from
    # serving /health). See tests/unit/test_docker_compose_cascade_safety.py
    # for the full classification and docs/remediation/2026-04-15-minitux-
    # install-failure.md (Commit 6) for the incident history.
    depends_on:
      postgres:
        condition: service_healthy    # genuine: api runs migrations + secret validation against postgres at startup
      redis:
        condition: service_healthy    # genuine: api performs synchronous PING during lifespan startup
      keycloak:
        condition: service_started    # cascade-safe: JWKS fetched lazily per-request, not at startup
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # D1: cap restart attempts so a permanent startup defect (e.g. the
    # 2026-04-15 Redis setsockopt EINVAL) stops spinning workers instead
    # of hiding under interleaved log noise. The api container's own
    # lifespan handler exits with code 3 on ConfigError; that counts as
    # an "on-failure" exit, so the restart budget is consumed. After 3
    # attempts the orchestrator gives up and the installer surfaces the
    # failed service by name.
    restart: on-failure:3
    networks:
      - fxlab-net
    volumes:
      - ./services/api:/app/services/api:ro
      - ./libs:/app/libs:ro

  # ---------------------------------------------------------------------------
  # Web service — React/Vite frontend (served via nginx or vite dev server)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fxlab-web
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://api:8000
      - NODE_ENV=development
    # B3 (2026-04-15 cascade): web is an nginx-served static SPA. It does
    # NOT require api to be healthy — the bundle can render a "backend
    # unavailable" state when api is down, which is strictly preferable to
    # parking web in 'created' state forever (which is what service_healthy
    # did during the 2026-04-15 minitux install: api crashlooped on Redis
    # EINVAL, web never started, the root cause was buried). service_started
    # keeps compose's log ordering sensible without propagating failure.
    # See tests/unit/test_docker_compose_cascade_safety.py and
    # docs/remediation/2026-04-15-minitux-install-failure.md (Commit 6).
    depends_on:
      api:
        condition: service_started    # cascade-safe: static SPA tolerates api unavailability
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    # D1: cap restart attempts so a permanent startup defect (e.g. the
    # 2026-04-15 Redis setsockopt EINVAL) stops spinning workers instead
    # of hiding under interleaved log noise. The api container's own
    # lifespan handler exits with code 3 on ConfigError; that counts as
    # an "on-failure" exit, so the restart budget is consumed. After 3
    # attempts the orchestrator gives up and the installer surfaces the
    # failed service by name.
    restart: on-failure:3
    networks:
      - fxlab-net

  # ---------------------------------------------------------------------------
  # Keycloak — Identity Provider (RS256 token issuance, user management)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: fxlab-keycloak
    command: start-dev --import-realm
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD must be set in .env}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fxlab}
      - KC_DB_USERNAME=${POSTGRES_USER:-fxlab}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import:ro
    # B3 (2026-04-15 cascade): keycloak persists its realm/user schema in
    # postgres at boot; without a healthy postgres keycloak crashloops.
    # Genuine service_healthy edge. See tests/unit/
    # test_docker_compose_cascade_safety.py for the full classification.
    depends_on:
      postgres:
        condition: service_healthy    # genuine: keycloak writes its schema to postgres at boot
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200\\|UP' <&3"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    # D1: cap restart attempts so a permanent startup defect (e.g. the
    # 2026-04-15 Redis setsockopt EINVAL) stops spinning workers instead
    # of hiding under interleaved log noise. The api container's own
    # lifespan handler exits with code 3 on ConfigError; that counts as
    # an "on-failure" exit, so the restart budget is consumed. After 3
    # attempts the orchestrator gives up and the installer surfaces the
    # failed service by name.
    restart: on-failure:3
    networks:
      - fxlab-net

  # ---------------------------------------------------------------------------
  # PostgreSQL — relational metadata database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: fxlab-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-fxlab}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      - POSTGRES_DB=${POSTGRES_DB:-fxlab}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fxlab -d fxlab"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # D1: cap restart attempts so a permanent startup defect (e.g. the
    # 2026-04-15 Redis setsockopt EINVAL) stops spinning workers instead
    # of hiding under interleaved log noise. The api container's own
    # lifespan handler exits with code 3 on ConfigError; that counts as
    # an "on-failure" exit, so the restart budget is consumed. After 3
    # attempts the orchestrator gives up and the installer surfaces the
    # failed service by name.
    restart: on-failure:3
    networks:
      - fxlab-net

  # ---------------------------------------------------------------------------
  # Redis — job queue and cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: fxlab-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    # D1: cap restart attempts so a permanent startup defect (e.g. the
    # 2026-04-15 Redis setsockopt EINVAL) stops spinning workers instead
    # of hiding under interleaved log noise. The api container's own
    # lifespan handler exits with code 3 on ConfigError; that counts as
    # an "on-failure" exit, so the restart budget is consumed. After 3
    # attempts the orchestrator gives up and the installer surfaces the
    # failed service by name.
    restart: on-failure:3
    networks:
      - fxlab-net

  # ---------------------------------------------------------------------------
  # Jaeger — Distributed tracing backend (OpenTelemetry)
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: fxlab-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:16687/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # D1: cap restart attempts so a permanent startup defect (e.g. the
    # 2026-04-15 Redis setsockopt EINVAL) stops spinning workers instead
    # of hiding under interleaved log noise. The api container's own
    # lifespan handler exits with code 3 on ConfigError; that counts as
    # an "on-failure" exit, so the restart budget is consumed. After 3
    # attempts the orchestrator gives up and the installer surfaces the
    # failed service by name.
    restart: on-failure:3
    networks:
      - fxlab-net

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  fxlab-net:
    driver: bridge
    name: fxlab-network

# ---------------------------------------------------------------------------
# Volumes — persistent data across container restarts
# ---------------------------------------------------------------------------
volumes:
  postgres-data:
    name: fxlab-postgres-data
  redis-data:
    name: fxlab-redis-data
