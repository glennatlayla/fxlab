# ============================================================================
# ENVIRONMENT CONFIGURATION GUIDE
# ============================================================================
#
# Set these in your .env.production or deployment orchestration:
#
#   ALERTMANAGER_WEBHOOK_URL
#       Default notification webhook for warning/info alerts.
#       Example: https://webhook.example.com/alerts/warning
#
#   ALERTMANAGER_CRITICAL_WEBHOOK_URL
#       Critical-only webhook (trading safety, DB down, etc).
#       Example: https://webhook.example.com/alerts/critical
#
#   SLACK_WEBHOOK_URL (optional)
#       Slack incoming webhook for Slack integration.
#       Format: https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXX
#
#   PAGERDUTY_SERVICE_KEY (optional)
#       PagerDuty integration key for on-call escalation.
#       Obtain from PagerDuty Integration → Events API v2
#
#   SMTP_PASSWORD (optional, if email enabled)
#       SMTP password for sending alert emails.
#
# ============================================================================
# TESTING
# ============================================================================
#
# Validate YAML syntax:
#   python3 -c "import yaml; yaml.safe_load(open('alertmanager.yml')); print('✓ Valid')"
#
# Test alert routing (amtool):
#   docker run --rm prom/alertmanager:latest amtool config routes --config.file=/config/alertmanager.yml
#
# Trigger test alert:
#   curl -X POST http://localhost:9093/api/v1/alerts -d '[{"labels":{"alertname":"TestAlert","severity":"critical"}}]'
#
