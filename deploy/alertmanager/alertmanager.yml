# FXLab Alertmanager Configuration
# ============================================================================
#
# Purpose:
#   Routes alerts from Prometheus to notification channels (webhook, email,
#   Slack, PagerDuty) based on severity and labels. Groups related alerts
#   to reduce notification noise.
#
# Alert Routing:
#   - Critical alerts: Fast deduplication (30s), 1h repeat
#   - Warning alerts: Slower deduplication (30s), 4h repeat
#   - All alerts: Webhook (configurable via env)
#
# Receivers:
#   - default_webhook: POST to ALERTMANAGER_WEBHOOK_URL
#   - (email, slack, pagerduty: see examples below)

global:
  # Resolver timeout is the time after which an alert expires if Prometheus
  # has not sent any updates. Set to 5 minutes to avoid stale alerts.
  resolve_timeout: 5m

  # Optional SMTP configuration for email notifications
  # Uncomment and configure to enable email alerts
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_auth_username: 'alerting@example.com'
  # smtp_auth_password: '${SMTP_PASSWORD}'
  # smtp_require_tls: true
  # smtp_from: 'alertmanager@fxlab.ai'

templates: []

# Root route with default receiver and grouping
route:
  receiver: 'default_webhook'
  group_by: ['alertname', 'severity', 'instance']
  group_wait: 30s          # Wait 30s to batch initial alerts
  group_interval: 5m       # Re-evaluate grouping every 5m
  repeat_interval: 4h      # Repeat notifications every 4h

  # Critical alerts: shorter timings to page on-call immediately
  routes:
    - match:
        severity: critical
      receiver: 'critical_webhook'
      group_by: ['alertname', 'severity', 'instance']
      group_wait: 10s       # Page immediately (10s batch window)
      group_interval: 5m
      repeat_interval: 1h   # Repeat critical alerts every 1h

    - match:
        severity: warning
      receiver: 'default_webhook'
      group_by: ['alertname', 'severity', 'instance']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h   # Warning repeat every 4h

# Receivers (notification endpoints)
receivers:

  # =========================================================================
  # Default Webhook Receiver (configurable)
  # =========================================================================
  # Routes all non-critical alerts to a webhook URL.
  # URL configured via ALERTMANAGER_WEBHOOK_URL environment variable.
  #
  # Example payload:
  #   {
  #     "status": "firing",
  #     "alerts": [
  #       {
  #         "status": "firing",
  #         "labels": {"alertname": "APIHighLatency", "severity": "warning"},
  #         "annotations": {"summary": "API latency high", "runbook_url": "..."}
  #       }
  #     ],
  #     "groupLabels": {"alertname": "APIHighLatency", "severity": "warning"},
  #     "commonLabels": {...},
  #     "commonAnnotations": {...},
  #     "externalURL": "http://alertmanager:9093",
  #     "version": "4",
  #     "groupKey": "{}:{alertname=\"APIHighLatency\", severity=\"warning\"}"
  #   }
  - name: 'default_webhook'
    webhook_configs:
      - url: '${ALERTMANAGER_WEBHOOK_URL:-http://localhost:5000/alerts}'
        send_resolved: true

  # =========================================================================
  # Critical Webhook Receiver (for page-immediately scenarios)
  # =========================================================================
  # Routes critical alerts (trading safety, DB down, broker disconnected)
  # to a dedicated webhook with faster processing requirements.
  - name: 'critical_webhook'
    webhook_configs:
      - url: '${ALERTMANAGER_CRITICAL_WEBHOOK_URL:-http://localhost:5001/alerts/critical}'
        send_resolved: true

# ============================================================================
# OPTIONAL RECEIVER EXAMPLES (uncomment and configure to enable)
# ============================================================================

