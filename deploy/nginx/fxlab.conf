# FXLab — Nginx edge reverse proxy configuration
#
# Routes:
#   /api/*     → FastAPI backend (fxlab-api:8000)
#   /health    → Local 200 for load balancer probes
#   /*         → React frontend (fxlab-web:3000)
#
# Security:
#   - All security headers (CSP, HSTS, X-Frame-Options)
#   - Rate limiting on API endpoints (10 req/s burst 20)
#   - Request body size limited to 10 MB
#   - Proxy timeouts tuned for trading platform latency
#
# TLS:
#   - HTTP → HTTPS redirect (when certs are present)
#   - TLS 1.2+ only, strong cipher suite
#
# Usage:
#   Mounted into the nginx container at /etc/nginx/conf.d/default.conf

# Upstreams
upstream fxlab_api {
    server fxlab-api:8000;
    keepalive 32;
}

upstream fxlab_web {
    server fxlab-web:3000;
    keepalive 16;
}

# Rate limiting zone — 10 req/s per IP with burst of 20
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# --- HTTP server (redirect to HTTPS when certs exist, or serve directly) ---
server {
    listen 80;
    server_name _;

    # Health check endpoint for load balancers and Docker healthcheck
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Security headers applied to all responses
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Request body size limit
    client_max_body_size 10m;

    # --- API proxy ---
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://fxlab_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts tuned for trading platform — orders must not hang
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;

        # SSE support — disable buffering for streaming endpoints
        proxy_buffering off;
        proxy_cache off;
    }

    # --- WebSocket proxy (future: live data feeds) ---
    location /ws/ {
        proxy_pass http://fxlab_api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # --- Frontend ---
    location / {
        proxy_pass http://fxlab_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1000;
}
