server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security Headers ───────────────────────────────────────────────
    # CSP: allow self-hosted scripts/styles, Sentry for error reporting,
    # API backend for data, and inline styles (Tailwind JIT needs this).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://*.sentry.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://*.sentry.io https://*.ingest.sentry.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;  # Modern CSP makes this obsolete; disable to avoid false positives
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ─── Static asset caching with immutable hashes ─────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-add security headers (nginx location blocks don't inherit parent add_header)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }

    # Proxy API calls to backend — avoids CORS entirely
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — all other paths serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
        # No caching for index.html (ensures latest version loaded)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        # Re-add security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
}
